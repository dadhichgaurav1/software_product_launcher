<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Launcher — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1d2430;
      background: #f6f8fc;
      margin: 0;
      padding: 32px;
    }
    .card {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e3e7ee;
      border-radius: 12px;
      padding: 24px;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    p.sub { color: #6b7280; margin: 0 0 20px; font-size: 13px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #6b7280; margin: 14px 0 4px; text-transform: uppercase; letter-spacing: .03em; }
    input {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid #e3e7ee;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus { outline: none; border-color: #3b5bdb; box-shadow: 0 0 0 2px rgba(59,91,219,.15); }
    .actions { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
    button {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      background: #3b5bdb;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #2f49b0; }
    .saved { color: #2e7d32; font-size: 13px; font-weight: 600; }
    .hint { color: #6b7280; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Software Product Launcher</h1>
    <p class="sub">Configure how the extension reaches your local backend.</p>

    <label for="backend-url">Backend Base URL</label>
    <input id="backend-url" type="url" placeholder="http://127.0.0.1:8000" />
    <div class="hint">Default: http://127.0.0.1:8000 — the FastAPI server.</div>

    <label for="product-url">Default Product URL</label>
    <input id="product-url" type="url" placeholder="https://yourproduct.com" />
    <div class="hint">Pre-fills the popup so you can launch faster.</div>

    <div class="actions">
      <button id="save">Save</button>
      <span id="saved" class="saved" style="display:none;">Saved ✓</span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
